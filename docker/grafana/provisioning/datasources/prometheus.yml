# Grafana Datasource Provisioning - Prometheus
# This file automatically configures the Prometheus datasource in Grafana

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    jsonData:
      timeInterval: 15s
      queryTimeout: 60s
      httpMethod: POST
    isDefault: false
    editable: true
    version: 1
