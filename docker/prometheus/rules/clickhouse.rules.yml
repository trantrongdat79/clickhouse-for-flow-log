# Prometheus Alert Rules for ClickHouse Monitoring
# These rules define alerts for ClickHouse health and performance

groups:
  - name: clickhouse_health
    interval: 30s
    rules:
      - alert: ClickHouseDown
        expr: up{job="clickhouse"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "ClickHouse instance {{ $labels.instance }} is down"
          description: "ClickHouse has been down for more than 1 minute."

      - alert: ClickHouseHighQueryDuration
        expr: histogram_quantile(0.95, rate(clickhouse_query_duration_seconds_bucket[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High query duration on {{ $labels.instance }}"
          description: "95th percentile query duration is above 10 seconds."

  - name: clickhouse_performance
    interval: 30s
    rules:
      - alert: ClickHouseHighMemoryUsage
        expr: clickhouse_memory_usage_bytes / clickhouse_memory_limit_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 90% of the limit."

      - alert: ClickHouseHighDiskUsage
        expr: (clickhouse_disk_used_bytes / clickhouse_disk_total_bytes) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage on {{ $labels.instance }}"
          description: "Disk usage is above 85% of capacity."
