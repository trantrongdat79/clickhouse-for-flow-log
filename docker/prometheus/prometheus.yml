# Prometheus Configuration for NetFlow Analytics Project
# Purpose: Monitor ClickHouse cluster and scrape metrics

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'netflow_cluster'
    environment: 'development'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # Add alertmanager:9093 if using Alertmanager

# Load alert rules
rule_files:
  - '/etc/prometheus/rules/*.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # ClickHouse metrics endpoint
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse01:8123']
        labels:
          service: 'clickhouse'
          node: 'clickhouse01'
    metrics_path: '/metrics'
    scheme: 'http'
    scrape_interval: 30s

  # Grafana monitoring (optional)
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service: 'grafana'

# Remote write configuration (for testing Prometheus as time-series store)
# Uncomment to enable remote write to ClickHouse
