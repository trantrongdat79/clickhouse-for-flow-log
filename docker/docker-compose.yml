version: '3.8'

# TODO: Implement docker-compose configuration
# 
# Services to define:
# 1. ZooKeeper (1-3 nodes depending on scale)
# 2. ClickHouse nodes (1-4 depending on scale)
# 3. Prometheus (for comparison)
# 4. Grafana (for visualization)
#
# For minimal testing setup:
#   - 1 ZooKeeper
#   - 1 ClickHouse (can't demonstrate replication but simplest start)
#
# For replication demo (recommended):
#   - 1 ZooKeeper
#   - 2 ClickHouse (1 shard, 2 replicas)
#
# For full demo:
#   - 3 ZooKeeper (ensemble)
#   - 4 ClickHouse (2 shards × 2 replicas)
#
# Key configurations:
#   - Named volumes for data persistence
#   - Bridge network for inter-container communication
#   - Port mappings (8123 HTTP, 9000 native for CH)
#   - Environment variables from .env file
#   - Health checks for readiness
#   - Resource limits (memory, CPU)
#
# Example structure:
# services:
#   zookeeper01:
#     image: zookeeper:${ZOOKEEPER_VERSION}
#     container_name: zookeeper01
#     volumes:
#       - zk_data01:/data
#     environment:
#       ZOO_MY_ID: 1
#   
#   clickhouse01:
#     image: clickhouse/clickhouse-server:${CLICKHOUSE_VERSION}
#     container_name: clickhouse01
#     depends_on:
#       - zookeeper01
#     volumes:
#       - ch_data01:/var/lib/clickhouse
#       - ../clickhouse-config/config.d:/etc/clickhouse-server/config.d
#
# volumes:
#   zk_data01:
#   ch_data01:
#
# networks:
#   clickhouse-net:

networks:
  clickhouse-net:
    driver: bridge

volumes:
