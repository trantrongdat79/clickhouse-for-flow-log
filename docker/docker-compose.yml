# ClickHouse NetFlow Analytics - Docker Compose Configuration
# Minimal setup for testing: 1 ClickHouse, 1 InfluxDB, 1 Grafana
# For production/clustering, see docker-compose.cluster.yml

services:
  # ClickHouse Database Server
  clickhouse:
    image: clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-24.1}
    container_name: clickhouse01
    hostname: clickhouse01
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"    # HTTP interface
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"  # Native protocol
      - "9009:9009"                              # Inter-server communication
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ../logs/clickhouse01:/var/log/clickhouse-server
      - ./clickhouse/clickhouse-config/config.d:/etc/clickhouse-server/config.d:ro
      - ./clickhouse/clickhouse-config/users.d:/etc/clickhouse-server/users.d
      - ./clickhouse/initdb.d:/docker-entrypoint-initdb.d:ro
    environment:
      CLICKHOUSE_DB: netflow
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-secure_password_change_me}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_ALWAYS_RUN_INITDB_SCRIPTS: 1  # Force init scripts to run even if data exists
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - netflow_network
    restart: unless-stopped

  # InfluxDB Time-Series Database (for comparison)
  influxdb:
    image: influxdb:${INFLUXDB_VERSION:-2.7}
    container_name: influxdb
    hostname: influxdb
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      #- ../data/influxdb:/var/lib/influxdb2
      - ../logs/influxdb:/var/log/influxdb
      - ./influxdb/scripts:/docker-entrypoint-initdb.d:ro
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-admin_password_change_me}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-netflow}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-flows}
      DOCKER_INFLUXDB_INIT_RETENTION: ${INFLUXDB_RETENTION:-30d}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-my-super-secret-auth-token}
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - netflow_network
    restart: unless-stopped

  # Grafana Visualization Platform
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-10.2.3}
    container_name: grafana
    hostname: grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ../data/grafana:/var/lib/grafana
      - ../logs/grafana:/var/log/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin_change_me}
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource,yesoreyeram-infinity-datasource,netsage-sankey-panel
      # Plugins already installed in volume, no need to reinstall
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_LOG_MODE: console file
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-admin}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-my-super-secret-auth-token}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-netflow}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-flows}
    depends_on:
      clickhouse:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - netflow_network
    restart: unless-stopped

networks:
  netflow_network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.200.0.0/16  # Changed from 172.25.0.0/16 to avoid VPN conflict

volumes:
  clickhouse_data:
    driver: local
  influxdb_data:
    driver: local
    # This creates a Docker-managed volume stored in Docker's storage area
    # (typically /var/lib/docker/volumes on Linux with ext4 filesystem)
    # This avoids NTFS filesystem permission issues with ClickHouse

# Note: Using named volume for ClickHouse data to avoid filesystem compatibility issues
# Data stored in Docker's internal storage (ext4 on Linux)
# InfluxDB uses bind mount to NTFS (no permission issues)
# Logs still use bind mounts to local directories for easy access:
#   - ../logs/clickhouse01 -> ClickHouse node 1 logs
#   - ../logs/influxdb -> InfluxDB logs
#   - ../logs/grafana -> Grafana logs
#   - ../data/influxdb -> InfluxDB data (NTFS compatible)
#   - ../data/grafana -> Grafana data (NTFS compatible)
# Backups (centralized by service):
#   - ../backups/clickhouse -> Cluster-wide ClickHouse backups
#   - ../backups/influxdb -> InfluxDB backups
#   - ../backups/grafana -> Grafana config/dashboard backups